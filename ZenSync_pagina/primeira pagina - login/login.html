<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa de Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="container">

        <form action="../pagina2_site/pagina.html"></form>

            <h1>Bem-vindo!</h1>

            <p>Faça login para continuar.</p>

            <div class="input-box">
                <input type="email" placeholder="Insira o e-mail" required>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Senha" required>
            </div>

            <div class="lembrar">
                <label>
                    <input type="checkbox">
                    Lembrar
                </label>

                <a href="#">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn">
                Login
            </button>

            <div class="registrar-link">
                <p>
                    Não tem uma conta?
                    <a href="#">Criar</a>
                </p>
            </div>

        </form>

    </div>

</body>
</html>
